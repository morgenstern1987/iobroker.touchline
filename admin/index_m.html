<html>

<link rel="stylesheet" type="text/css" href="../../lib/css/themes/jquery-ui/redmond/jquery-ui.min.css"/>
<script type="text/javascript" src="../../lib/js/jquery-1.11.1.min.js"></script>
<script type="text/javascript" src="../../socket.io/socket.io.js"></script>
<script type="text/javascript" src="../../lib/js/jquery-ui-1.10.3.full.min.js"></script>

<link rel="stylesheet" type="text/css" href="../../css/adapter.css"/>
<script type="text/javascript" src="../../js/translate.js"></script>
<script type="text/javascript" src="../../js/adapter-settings.js"></script>
<script type="text/javascript" src="words.js"></script>

<script type="text/javascript">

function load(settings, onChange) {

    if (!settings) return;

    $('.value').each(function () {

        var $key = $(this);
        var id = $key.attr('id');

        if ($key.attr('type') === 'checkbox') {

            $key.prop('checked', settings[id]).change(function() {
                onChange(true);
            });

        } else {

            $key.val(settings[id]).change(function() {
                onChange(true);
            }).keyup(function() {
                onChange(true);
            });

        }
    });

    onChange(false);
}

function save(callback) {

    var obj = {};

    $('.value').each(function () {

        var $this = $(this);

        if ($this.attr('type') === 'checkbox') {
            obj[$this.attr('id')] = $this.prop('checked');
        } else {
            obj[$this.attr('id')] = $this.val();
        }

    });

    callback(obj);
}

</script>

<div id="adapter-container">

<table>
<tr>
<td><h3 class="translate">Touchline adapter settings</h3></td>
</tr>
</table>

<table>

<tr>
<td><label for="host" class="translate">Controller IP:</label></td>
<td><input class="value" id="host"/></td>
</tr>

<tr>
<td><label for="pollInterval" class="translate">Polling interval:</label></td>
<td><input class="value" id="pollInterval"/></td>
</tr>

</table>

<p class="translate">Adapter restarts after saving configuration</p>

</div>

</html>
