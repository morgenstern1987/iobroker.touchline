<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<link rel="stylesheet" href="../../css/adapter.css">
<link rel="stylesheet" href="../../lib/css/materialize.css">

<script src="../../lib/js/jquery-3.6.0.min.js"></script>
<script src="../../lib/js/materialize.js"></script>

<script src="../../js/translate.js"></script>
<script src="../../js/adapter-settings.js"></script>

</head>

<body>

<div class="m adapter-container">

<div class="row">
<div class="col s12">
<h4>Touchline Adapter</h4>
</div>
</div>

<div class="row">

<div class="input-field col s6">
<input id="host" class="value" type="text">
<label for="host">Controller IP</label>
</div>

<div class="input-field col s6">
<input id="pollInterval" class="value" type="number">
<label for="pollInterval">Polling Interval</label>
</div>

</div>

</div>

<script>

function load(settings, onChange) {

    if (!settings) return;

    $('#host').val(settings.host || '');
    $('#pollInterval').val(settings.pollInterval || 30);

    M.updateTextFields();

    $('.value').on('change keyup', function () {
        onChange();
    });

    onChange(false);
}

function save(callback) {

    const obj = {};

    obj.host = $('#host').val();
    obj.pollInterval = parseInt($('#pollInterval').val()) || 30;

    callback(obj);
}

</script>

</body>
</html>
